name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Check zlib support
        run: emacs -Q --batch --eval "(message \"zlib: %s\" (fboundp 'zlib-decompress-region))"
      - name: Byte-compile
        run: make compile
      - name: Run tests
        run: make test
